<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Wellness Buddy — tracking nutrizionale e wellness" />

    <!-- PWA manifest meta (UI-SPEC §10.4) -->
    <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1B1F26" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Wellness Buddy" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Icons (placeholders Sprint 1; final Plan 08) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />

    <title>Wellness Buddy</title>

    <!-- OKLCH baseline check (Pitfall #6 — Safari 16.4+) -->
    <script>
      (function () {
        if (!window.CSS || !CSS.supports || !CSS.supports('color', 'oklch(50% 0 0)')) {
          document.documentElement.classList.add('no-oklch');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
