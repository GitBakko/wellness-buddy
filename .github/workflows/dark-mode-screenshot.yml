name: Dark Mode Visual Diff
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter frontend exec playwright install --with-deps chromium
      - run: pnpm --filter frontend build
      - name: Run visual diff (light + dark per route, UI-12)
        run: pnpm --filter frontend test:visual
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-screenshots
          path: frontend/test-results/
