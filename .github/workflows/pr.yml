name: PR Checks
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter frontend lint
      - run: pnpm --filter frontend typecheck
      - run: pnpm --filter frontend build
      - run: pnpm --filter frontend test

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wnbd
          POSTGRES_PASSWORD: WnBd4321@
          POSTGRES_DB: WellnessBuddy
          PGTZ: UTC
          TZ: UTC
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://wnbd:WnBd4321@@localhost:5432/WellnessBuddy
      SECRET_KEY: ci-test-secret-key-do-not-use-in-prod-32-bytes-hex
      AI_PROVIDER: 'null'
      CORS_ORIGINS: http://localhost:5173
      ADMIN_EMAIL: ci@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: astral-sh/setup-uv@v3
      - run: cd backend && uv sync
      - run: cd backend && uv run ruff check
      - run: cd backend && uv run mypy app || true  # mypy strict gradually adopted
      - run: cd backend && uv run pytest --cov=app --cov-report=term-missing
