      letter-spacing: 0.04em;
    }
    section.category {
      page-break-inside: avoid;
      margin: 0 0 14pt 0;
    }
    section.category h2 {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 600;
      font-size: 14pt;
      color: oklch(48% 0.13 150);
      border-bottom: 2pt solid oklch(48% 0.13 150);
      padding-bottom: 3pt;
      margin: 0 0 6pt 0;
    }
    ul.items { list-style: none; padding: 0; margin: 0; }
    ul.items li {
      display: flex;
      align-items: baseline;
      padding: 3pt 0;
      border-bottom: 1pt solid oklch(89% 0.012 85);
      font-size: 12pt;
    }
    ul.items li .checkbox {
      font-family: "Geist Mono", monospace;
      font-size: 13pt;
      margin-right: 8pt;
      color: oklch(38% 0.015 240);
    }
    ul.items li .name { flex: 1; font-weight: 500; }
    ul.items li .qty {
      font-family: "Geist Mono", monospace;
      font-weight: 400;
      font-size: 11pt;
      color: oklch(38% 0.015 240);
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <span class="domain">{{ domain }}</span>
  <header>
    <h1 class="title">Lista spesa</h1>
    <p class="subtitle">settimana del {{ week_start_long_it }}</p>
    <div class="wordmark">Wellness Buddy</div>
  </header>
  <main>
    {% for category in categories %}
    <section class="category">
      <h2>{{ category.name }}</h2>
      <ul class="items">
        {% for item in category.items %}
        <li>
          <span class="checkbox">☐</span>
          <span class="name">{{ item.name }}</span>
          <span class="qty">{{ item.quantity_it }}</span>
        </li>
        {% endfor %}
      </ul>
    </section>
    {% endfor %}
  </main>
</body>
</html>
